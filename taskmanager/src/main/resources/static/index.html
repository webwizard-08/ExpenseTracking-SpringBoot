<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

<h1>Expense Tracker</h1>

<input type="text"
       id="name"
       placeholder="Name">

<input type="text"
       id="title"
       placeholder="Title">

<input type="number"
       id="amount"
       placeholder="Amount">

<input type="text"
       id="category"
       placeholder="Category">

<input type="date"
       id="date">

<button id="mainButton"
        onclick="addExpense()">

    Add Expense
</button>

<table>

    <thead>

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Title</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Date</th>
        <th>Actions</th>
    </tr>

    </thead>

    <tbody id="expenseTable">

    </tbody>

</table>

<script src="script.js"></script>

</body>
</html>
